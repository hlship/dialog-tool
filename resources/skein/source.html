<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/style.css" rel="stylesheet">
    <title>{{file-path}} — Dialog Source</title>
</head>
<body class="m-0 p-0 bg-white">

<div class="bg-gray-50 border-b border-gray-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
    <span class="font-semibold text-base font-mono">{{file-path}}</span>
    {% if line %}
    <span class="text-gray-500 text-sm">Line {{line}} of {{line-count}}</span>
    {% endif %}
</div>

<div class="font-mono text-sm leading-relaxed">
    <table class="border-collapse w-full">
        <tbody>
            {% for source-line in lines %}
            <tr id="L{{source-line.number}}" class="{% if source-line.highlighted %}bg-yellow-200{% else %}hover:bg-blue-50{% endif %}">
                <td class="text-right pr-3 pl-4 select-none align-top border-r border-gray-200 whitespace-nowrap {% if source-line.highlighted %}text-amber-800 font-bold{% else %}text-gray-400{% endif %}">{{source-line.number}}</td>
                <td class="px-4 whitespace-pre">{{source-line.text}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% if line %}
<script>
    document.getElementById('L{{line}}')?.scrollIntoView({block: 'center'});
</script>
{% endif %}

</body>
</html>
